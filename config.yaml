# Market arbitrage tracker configuration.
# Every value here has a built-in default; delete a line to fall back to it.

poll_interval: 5      # seconds between polling cycles
min_net_bps: 10       # opportunities must clear this net spread (basis points) to be reported
transfer_haircut_bps: 5   # flat allowance per round-trip for withdrawal/transfer costs

# Markets and the assets tracked in each (quoted in USD / USDT / USDC).
markets:
  crypto: { assets: [BTC, ETH, SOL, XRP, LTC, DOGE, ADA] }
  fx:     { assets: [EUR, GBP, AUD] }     # vs USD
  metals: { assets: [XAU, XAG] }          # gold, silver (XAU trades as PAXG on crypto venues)

# Quote currencies treated as interchangeable when comparing prices across
# venues. Opportunities that cross quote currencies are flagged in the UI.
quote_equivalence:
  - [USD, USDT, USDC]

# taker_fee_bps: taker fee in basis points used to net out costs.
# Adjust to your own fee tier on each venue. Reference-rate feeds
# (frankfurter, openerapi, currencyapi, stooq) are not tradable: they are
# used for price tracking/divergence only and never form opportunities.
exchanges:
  binance:     { enabled: true, taker_fee_bps: 10 }   # Global — crypto, fx, PAXG
  kraken:      { enabled: true, taker_fee_bps: 26 }   # US — crypto + fiat FX pairs
  coinbase:    { enabled: true, taker_fee_bps: 60 }   # US — crypto
  bitstamp:    { enabled: true, taker_fee_bps: 40 }   # EU — crypto + fiat FX pairs
  bitfinex:    { enabled: true, taker_fee_bps: 20 }   # BVI — crypto
  kucoin:      { enabled: true, taker_fee_bps: 10 }   # Seychelles — crypto, PAXG
  okx:         { enabled: true, taker_fee_bps: 10 }   # Asia — crypto
  gateio:      { enabled: true, taker_fee_bps: 20 }   # Asia — crypto, PAXG
  frankfurter: { enabled: true, taker_fee_bps: 0 }    # ECB reference rates (fx)
  openerapi:   { enabled: true, taker_fee_bps: 0 }    # open.er-api.com (fx)
  currencyapi: { enabled: true, taker_fee_bps: 0 }    # currency-api (fx + metals)
  stooq:       { enabled: true, taker_fee_bps: 0 }    # stooq.com delayed (fx + metals)

db_path: arb.sqlite3
history_retention_hours: 72

# ---------------------------------------------------------------------------
# LIVE AUTONOMOUS TRADING — places REAL orders with REAL funds when armed.
# enabled: true alone does nothing; the trader also requires the environment
# variable ARB_TRADING_ARMED=I-ACCEPT-THE-RISK plus API credentials
# (ARB_BINANCE_API_KEY/ARB_BINANCE_API_SECRET, ARB_KRAKEN_API_KEY/...).
# Stop it at any time: create the kill-switch file or set ARB_KILL_SWITCH=1.
# ---------------------------------------------------------------------------
trading:
  enabled: false
  venues: [binance, kraken]     # venues with execution support + credentials
  assets: [BTC, ETH]            # assets the trader may touch
  markets: [crypto]
  min_execute_bps: 30           # execute only if net spread clears this
  max_trade_notional_usd: 100   # hard cap per trade
  max_daily_notional_usd: 1000  # hard cap per rolling 24h
  max_trades_per_day: 20
  max_daily_loss_usd: 50        # stop trading for the day past this
  cooldown_seconds: 60          # min gap between trades in the same asset
  max_quote_age_seconds: 3      # never trade on stale quotes
  max_consecutive_failures: 3   # circuit breaker: then disarm until restart
  kill_switch_file: TRADING_KILL_SWITCH
  unwind_partials: true         # market-out the overfilled leg of a partial
  use_ws_books: true            # live WS top-of-book: re-verify + size caps
